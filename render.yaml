services:
  - type: web
    name: medai-diagnostics
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && gunicorn --bind 0.0.0.0:10000 --workers 2 app:app
    envVars:
      - key: FLASK_APP
        value: app.py
      - key: FLASK_ENV
        value: production
      - key: FLASK_RUN_HOST
        value: 0.0.0.0
      - key: FLASK_RUN_PORT
        value: 10000
    healthCheckPath: /
    plan: free