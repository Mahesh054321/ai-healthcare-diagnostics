services:
  - type: web
    name: medai-diagnostics
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --chdir src app:app
    envVars:
      - key: FLASK_APP
        value: app.py
      - key: FLASK_ENV
        value: production
      - key: FLASK_RUN_HOST
        value: 0.0.0.0
      - key: PYTHONPATH
        value: /opt/render/project/src
    healthCheckPath: /
    plan: free