<form method="POST" target="_blank">

<div class="card p-4 shadow-lg">

<h3 class="text-success text-center">🍬 Diabetes Risk Assessment</h3>

<label>Pregnancies</label>
<input type="number" name="pregnancies" class="form-control" min="0" max="20" required>

<label>Glucose Level</label>
<input type="number" name="glucose" class="form-control" min="50" max="300" required>

<label>Blood Pressure</label>
<input type="number" name="bloodpressure" class="form-control" min="40" max="180" required>

<label>Skin Thickness</label>
<input type="number" name="skinthickness" class="form-control" min="0" max="100" required>

<label>Insulin</label>
<input type="number" name="insulin" class="form-control" min="0" max="900" required>

<label>BMI</label>
<input type="number" step="0.1" name="bmi" class="form-control" min="10" max="60" required>

<label>Diabetes Pedigree Function</label>
<input type="number" step="0.01" name="dpf" class="form-control" min="0" max="3" required>

<label>Age</label>
<input type="number" name="age" class="form-control" min="10" max="100" required>

<button class="btn btn-success w-100 mt-3">Analyze Risk</button>

</div>
</form>
