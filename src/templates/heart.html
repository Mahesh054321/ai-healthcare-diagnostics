<!DOCTYPE html>
<html>
<head>
<title>Heart Disease Prediction</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
width:450px;
margin:auto;
padding:30px;
margin-top:40px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
width:90%;
padding:10px;
margin:6px;
}

button{
padding:10px 20px;
background:#e74c3c;
color:white;
border:none;
border-radius:5px;
}

.result{
margin-top:20px;
font-size:20px;
color:red;
}

</style>

</head>

<body>

<div class="container">

<h2>Heart Disease Prediction</h2>

<form method="POST">

<input type="text" name="age" placeholder="Age" required>

<label>Sex</label>
<select name="sex">
<option value="1">Male</option>
<option value="0">Female</option>
</select>

<input type="text" name="cp" placeholder="Chest Pain Type" required>

<input type="text" name="trestbps" placeholder="Resting Blood Pressure" required>

<input type="text" name="chol" placeholder="Cholesterol" required>

<input type="text" name="fbs" placeholder="Fasting Blood Sugar" required>

<input type="text" name="restecg" placeholder="Rest ECG" required>

<input type="text" name="thalach" placeholder="Max Heart Rate" required>

<label>Exercise Angina</label>
<select name="exang">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<input type="text" name="oldpeak" placeholder="Oldpeak" required>

<input type="text" name="slope" placeholder="Slope" required>

<input type="text" name="ca" placeholder="Major Vessels" required>

<input type="text" name="thal" placeholder="Thalassemia" required>

<button type="submit">Predict</button>

</form>

{% if prediction %}
<div class="result">
{{prediction}}
</div>
{% endif %}

<br>
<a href="/">Back</a>

</div>

</body>
</html>
