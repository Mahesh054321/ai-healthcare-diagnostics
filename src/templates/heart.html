<!DOCTYPE html>
<html>
<head>

<title>DR’s AI Heart Risk Assessment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(to right,#e3f2fd,#ffffff);
font-family:Segoe UI;
}

.card{
border-radius:20px;
box-shadow:0px 10px 30px rgba(0,0,0,0.2);
}

.header{
background:#0d6efd;
color:white;
padding:20px;
text-align:center;
}

</style>

</head>

<body>

<div class="header">
<h2>❤️ DR’s AI Heart Disease Risk Assessment</h2>
</div>

<div class="container mt-5">

<form method="POST" target="_blank">

<div class="card p-4">

<label>Age</label>
<input type="number" name="age" class="form-control" min="18" max="100" required>

<label>Sex</label>
<select name="sex" class="form-control">
<option value="1">Male</option>
<option value="0">Female</option>
</select>

<label>Chest Pain Type</label>
<select name="cp" class="form-control">
<option value="0">Typical Angina</option>
<option value="1">Atypical Angina</option>
<option value="2">Non-Anginal Pain</option>
<option value="3">Asymptomatic</option>
</select>

<label>Resting Blood Pressure</label>
<input type="number" name="trestbps" class="form-control" min="80" max="200" required>

<label>Cholesterol Level</label>
<input type="number" name="chol" class="form-control" min="100" max="600" required>

<label>Fasting Blood Sugar</label>
<select name="fbs" class="form-control">
<option value="1">Greater than 120 mg/dl</option>
<option value="0">Less than 120 mg/dl</option>
</select>

<label>Rest ECG Result</label>
<select name="restecg" class="form-control">
<option value="0">Normal</option>
<option value="1">ST-T Abnormality</option>
<option value="2">Left Ventricular Hypertrophy</option>
</select>

<label>Max Heart Rate Achieved</label>
<input type="number" name="thalach" class="form-control" min="60" max="220" required>

<label>Exercise Induced Angina</label>
<select name="exang" class="form-control">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Old Peak (ST depression)</label>
<input type="number" step="0.1" name="oldpeak" class="form-control" min="0" max="6" required>

<label>Slope</label>
<select name="slope" class="form-control">
<option value="0">Upsloping</option>
<option value="1">Flat</option>
<option value="2">Downsloping</option>
</select>

<label>Number of Major Vessels</label>
<select name="ca" class="form-control">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>

<label>Thalassemia</label>
<select name="thal" class="form-control">
<option value="1">Normal</option>
<option value="2">Fixed Defect</option>
<option value="3">Reversible Defect</option>
</select>

<button class="btn btn-danger mt-4 w-100">Analyze Heart Risk</button>

</div>

</form>

</div>

</body>
</html>
