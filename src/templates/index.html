<!DOCTYPE html>
<html>
<head>
    <title>AI Diabetes Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center text-primary mb-4">
            🩺 AI Diabetes Prediction System
        </h2>

        <form action="/predict" method="post">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Pregnancies</label>
                    <input type="number" name="Pregnancies" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Glucose</label>
                    <input type="number" name="Glucose" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Blood Pressure</label>
                    <input type="number" name="BloodPressure" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Skin Thickness</label>
                    <input type="number" name="SkinThickness" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Insulin</label>
                    <input type="number" name="Insulin" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>BMI</label>
                    <input type="number" step="any" name="BMI" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Diabetes Pedigree Function</label>
                    <input type="number" step="any" name="DPF" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Age</label>
                    <input type="number" name="Age" class="form-control" required>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary px-4">
                    Predict
                </button>
            </div>

        </form>

    </div>
</div>

</body>
</html>
