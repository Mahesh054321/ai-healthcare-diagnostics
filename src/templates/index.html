<!DOCTYPE html>
<html>
<head>
<title>DR's AI - Healthcare Diagnostics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(to right,#e3f2fd,#ffffff);
font-family: 'Segoe UI', sans-serif;
}

.header{
background:#0d6efd;
color:white;
padding:25px;
text-align:center;
box-shadow:0px 3px 10px rgba(0,0,0,0.2);
}

.card{
border-radius:20px;
box-shadow:0px 10px 25px rgba(0,0,0,0.15);
transition:0.3s;
}

.card:hover{
transform: scale(1.05);
}

.btn-heart{
background:#dc3545;
color:white;
border-radius:25px;
}

.btn-diabetes{
background:#198754;
color:white;
border-radius:25px;
}

.footer{
margin-top:60px;
text-align:center;
color:gray;
}

.logo{
font-size:40px;
}

</style>

</head>

<body>

<div class="header">
<h1 class="logo">🩺 DR’s AI</h1>
<p>Smart Disease Prediction using Machine Learning & Explainable AI</p>
</div>

<div class="container mt-5">

<div class="row">

<div class="col-md-6">
<div class="card p-4 text-center">
<h3>❤️ Heart Disease Prediction</h3>
<p>Analyze cardiovascular health risk instantly</p>
<a href="/heart" class="btn btn-heart">Check Now</a>
</div>
</div>

<div class="col-md-6">
<div class="card p-4 text-center">
<h3>🍬 Diabetes Prediction</h3>
<p>Early diabetes detection with AI support</p>
<a href="/diabetes" class="btn btn-diabetes">Check Now</a>
</div>
</div>

</div>

</div>

<div class="footer">
<p>Powered by DR’s AI • AI Healthcare Diagnostics System</p>
</div>
<script src="https://unpkg.com/scrollreveal"></script>

<script>
ScrollReveal().reveal('.card',{
delay:200,
distance:'60px',
origin:'bottom',
duration:1000
});
</script>

</body>
</html>
