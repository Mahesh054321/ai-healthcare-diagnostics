<!DOCTYPE html>
<html>

<head>
	<title>DR’s AI Medical Report</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<style>
		body {
			min-height: 100vh;
			background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
			font-family: 'Inter', sans-serif;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.glass-card {
			background: rgba(255, 255, 255, 0.85);
			border-radius: 24px;
			box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
			backdrop-filter: blur(8px);
			padding: 2.5rem 2rem;
			max-width: 600px;
			width: 100%;
			margin: 2rem auto;
		}

		.risk-meter {
			display: flex;
			flex-direction: column;
			align-items: center;
			margin-bottom: 2rem;
		}

		.meter-label {
			font-weight: 700;
			margin-top: 1rem;
			font-size: 1.2rem;
		}

		.ai-img {
			width: 120px;
			margin: 0 auto 1.5rem auto;
			display: block;
		}

		.feature-chart {
			margin-top: 2rem;
		}
	</style>
</head>

<body>
	<div class="glass-card">
		<img class="ai-img" src="https://assets10.lottiefiles.com/packages/lf20_2ks3pjua.json" alt="AI Doctor"
			id="lottie-ai" />
		<h2 class="text-center mb-3">🩺 DR’s AI Medical Report</h2>
		<hr>
		<h4 class="text-center">Diagnosis Result</h4>
		{% if "No" in prediction %}
		<div class="alert alert-success text-center">Low Risk Patient</div>
		{% else %}
		<div class="alert alert-danger text-center">High Risk Patient</div>
		{% endif %}
		<div class="risk-meter">
			<canvas id="riskGauge" width="120" height="120"></canvas>
			<div class="meter-label">Risk Level: <span id="riskValue">{{risk}}</span>%</div>
		</div>
		<h4>Clinical Explanation</h4>
		<p>{{explanation}}</p>
		<h4>AI Explanation</h4>
		<p>{{ai_explanation}}</p>
		<h4 class="mt-3">Feature Impact</h4>
		<canvas id="featureChart" height="120"></canvas>
		<div class="feature-chart">
			<img src="{{ url_for('static', filename='shap_plot.png') }}" width="100%"
				style="border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);max-width:350px;">
		</div>
	</div>
	<!-- Lottie player for 3D AI image -->
	<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
	<script>

		const shapFeatureNames = JSON.parse('{{ shap_names | tojson | safe }}');
		const shapFeatureValues = JSON.parse('{{ shap_values | tojson | safe }}');

		const featureCtx = document.getElementById('featureChart').getContext('2d');

		new Chart(featureCtx, {
			type: 'bar',
			data: {
				labels: shapFeatureNames,
				datasets: [{
					label: 'Impact',
					data: shapFeatureValues,
					backgroundColor: '#6366f1',
					borderRadius: 8
				}]
			},
			options: {
				plugins: { legend: { display: false } },
				scales: { y: { beginAtZero: true } }
			}
		});

	</script>
</body>

</html>
